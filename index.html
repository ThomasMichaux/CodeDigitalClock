<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock & Weather - Dark Mode</title>
    <meta name="description" content="A high-contrast dark mode digital clock with date, location, and weather information.">
    
    <!-- Link to CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="app-container">
        <!-- Time Section -->
        <section class="time-section">
            <time id="clock" class="clock-display" aria-label="Current Time">00:00<span class="seconds-indicator">:00</span></time>
        </section>

        <!-- Date Section -->
        <section class="date-section">
            <div id="date" class="date-display" aria-label="Current Date">
                <span class="date-main skeleton">Loading Date</span>
                <span class="date-secondary skeleton">Loading Context</span>
            </div>
        </section>

        <!-- Info Grid: Location & Weather -->
        <section class="info-grid">
            
            <!-- Location Card -->
            <article class="card">
                <div class="icon-box" id="loc-icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                </div>
                <div class="card-content">
                    <span class="label">Location</span>
                    <span id="location-text" class="value skeleton">Locating...</span>
                </div>
            </article>

            <!-- Weather Card -->
            <article class="card">
                <div class="icon-box">
                    <div id="weather-icon-container">
                        <svg id="default-weather-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M12 2v2"></path>
                            <path d="M12 20v2"></path>
                            <path d="m4.93 4.93 1.41 1.41"></path>
                            <path d="m17.66 17.66 1.41 1.41"></path>
                            <path d="M2 12h2"></path>
                            <path d="M20 12h2"></path>
                            <path d="m6.34 17.66-1.41 1.41"></path>
                            <path d="m19.07 4.93-1.41 1.41"></path>
                            <circle cx="12" cy="12" r="4"></circle>
                        </svg>
                    </div>
                </div>
                <div class="card-content">
                    <span class="label">Weather</span>
                    <div class="value">
                        <span id="temp-text">--</span>°<span class="temp-high" id="weather-desc">Loading...</span>
                    </div>
                </div>
            </article>

        </section>

        <div id="error-container" class="error-msg" role="alert"></div>
    </main>

    <footer class="app-footer">
        <p>High-Contrast Dark Mode</p>
    </footer>

    <!-- Link to JavaScript -->
    <script src="script.js"></script>
</body>
</html>
